apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-notification-service
  namespace: cloud2
  labels:
    app: hr-notification-service
    version: "1.0"
    component: microservice-3
spec:
  replicas: 4
  selector:
    matchLabels:
      app: hr-notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: hr-notification-service
        version: "1.0"
    spec:
      restartPolicy: Always
      containers:
      
        - name: hr-notification-service
          image: hr-notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
              protocol: TCP
          env:
            - name: DB_URL
              value: "jdbc:postgresql://database-laby-chmury.cfwkgaeacvgh.eu-north-1.rds.amazonaws.com:5432/hr_notification_db"
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "2"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cloud2-secrets
                  key: AWS_RDS_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud2-secrets
                  key: AWS_RDS_PASSWORD
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: cloud2-secrets
                  key: RABBITMQ_URI
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
---

apiVersion: v1
kind: Service
metadata:
  name: hr-notification-service
  namespace: cloud2
  labels:
    app: hr-notification-service
spec:
  selector:
    app: hr-notification-service
  ports:
    - name: http
      protocol: TCP
      port: 8083
      targetPort: 8083
  type: ClusterIP


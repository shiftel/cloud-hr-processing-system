apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-analysis-service
  namespace: cloud2
  labels:
    app: document-analysis-service
    version: "1.0"
    component: microservice-2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: document-analysis-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: document-analysis-service
        version: "1.0"
    spec:
      restartPolicy: Always
      containers:
        - name: document-analysis-service
          image: document-analysis-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
              protocol: TCP
          env:
            - name: DB_URL
              value: "jdbc:postgresql://database-laby-chmury.cfwkgaeacvgh.eu-north-1.rds.amazonaws.com:5432/document_analysis_db"
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "2"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cloud2-secrets
                  key: AWS_RDS_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud2-secrets
                  key: AWS_RDS_PASSWORD
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: cloud2-secrets
                  key: RABBITMQ_URI
          resources:
            requests:
              cpu: "300m"
              memory: "384Mi"
            limits:
              cpu: "600m"
              memory: "768Mi"
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: document-analysis-service
  namespace: cloud2
  labels:
    app: document-analysis-service
spec:
  selector:
    app: document-analysis-service
  ports:
    - name: http
      protocol: TCP
      port: 8082
      targetPort: 8082
  type: ClusterIP


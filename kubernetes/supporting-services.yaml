      labels:
        app: verification-service
        version: "1.0"
    spec:
      restartPolicy: Always
      containers:
        - name: verification-service
          image: verification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8085
              protocol: TCP
          env:
            - name: DB_URL
              value: "jdbc:postgresql://database-laby-chmury.cfwkgaeacvgh.eu-north-1.rds.amazonaws.com:5432/verification_db"
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "2"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cloud2-secrets
                  key: AWS_RDS_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud2-secrets
                  key: AWS_RDS_PASSWORD
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: cloud2-secrets
                  key: RABBITMQ_URI
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: verification-service
  namespace: cloud2
  labels:
    app: verification-service
spec:
  selector:
    app: verification-service
  ports:
    - name: http
      protocol: TCP
      port: 8085
      targetPort: 8085
  type: ClusterIP


